name: Daily Streaming News Digest (Kazakhstan)

on:
  # Запуск каждый день в 10:00 по Алма-Ате (UTC+5 → UTC 05:00)
  schedule:
    - cron: '0 5 * * *'
  # Ручной запуск через интерфейс GitHub Actions
  workflow_dispatch:

jobs:
  collect-and-notify:
    name: Collect & Send Digest
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_RECIPIENTS: ${{ secrets.EMAIL_RECIPIENTS }}
        run: python main.py

      - name: Upload digest as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: digest-${{ github.run_id }}-${{ github.run_attempt }}
          path: output/
          retention-days: 30
          if-no-files-found: warn
