name: Конкурентная разведка ТВ+

on:
  schedule:
    # Каждый день в 08:00 по Алматы (UTC+5) = 03:00 UTC
    - cron: '0 3 * * *'
  workflow_dispatch:   # ручной запуск из GitHub UI

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Restore seen-items cache (state/)
        uses: actions/cache@v4
        with:
          path: state/
          key: monitor-state-${{ runner.os }}
          restore-keys: monitor-state-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Run competitor monitoring agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python monitor.py

      - name: Upload digest as artifact
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ github.run_id }}
          path: reports/
          retention-days: 30
